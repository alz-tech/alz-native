name: Build & Release AlzScript Native

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilers
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf

      - name: Build Linux x64
        run: |
          gcc -std=c11 -O2 -Iinclude \
            src/value.c src/chunk.c src/vm.c src/lexer.c \
            src/compiler.c src/stdlib.c src/http.c src/db.c src/main.c \
            -o alzc-linux-x64 -lm
          strip alzc-linux-x64

      - name: Build Linux ARM64 (static)
        run: |
          aarch64-linux-gnu-gcc -std=c11 -O2 -static -Iinclude \
            src/value.c src/chunk.c src/vm.c src/lexer.c \
            src/compiler.c src/stdlib.c src/http.c src/db.c src/main.c \
            -o alzc-linux-arm64 -lm
          aarch64-linux-gnu-strip alzc-linux-arm64

      - name: Build Linux ARM (Termux-compatible, static)
        run: |
          arm-linux-gnueabihf-gcc -std=c11 -O2 -static -Iinclude \
            src/value.c src/chunk.c src/vm.c src/lexer.c \
            src/compiler.c src/stdlib.c src/http.c src/db.c src/main.c \
            -o alzc-linux-arm -lm
          arm-linux-gnueabihf-strip alzc-linux-arm

      - uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: alzc-linux-*

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW
        run: sudo apt-get install -y mingw-w64

      - name: Build Windows x64
        run: |
          x86_64-w64-mingw32-gcc -std=c11 -O2 -Iinclude \
            src/value.c src/chunk.c src/vm.c src/lexer.c \
            src/compiler.c src/stdlib.c src/http.c src/db.c src/main.c \
            -o alzc-windows-x64.exe -lm -lws2_32
          x86_64-w64-mingw32-strip alzc-windows-x64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: alzc-windows-x64.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS ARM64 (Apple Silicon)
        run: |
          clang -std=c11 -O2 -target arm64-apple-macos11 -Iinclude \
            src/value.c src/chunk.c src/vm.c src/lexer.c \
            src/compiler.c src/stdlib.c src/http.c src/db.c src/main.c \
            -o alzc-macos-arm64 -lm
          strip alzc-macos-arm64

      - name: Build macOS x64 (Intel)
        run: |
          clang -std=c11 -O2 -target x86_64-apple-macos10.15 -Iinclude \
            src/value.c src/chunk.c src/vm.c src/lexer.c \
            src/compiler.c src/stdlib.c src/http.c src/db.c src/main.c \
            -o alzc-macos-x64 -lm
          strip alzc-macos-x64

      - uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: alzc-macos-*

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x alzc-linux-* alzc-macos-*

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: AlzScript Native ${{ steps.version.outputs.VERSION }}
          body: |
            ## AlzScript Native ${{ steps.version.outputs.VERSION }}

            Zero dependencies. No Node. No Python. Just AlzScript.

            ### Install (Linux / Termux)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/alz-tech/alz-native/main/install.sh | bash
            ```

            ### Download manually

            | Platform | File |
            |---|---|
            | Linux x64 (Ubuntu, Debian, VPS) | `alzc-linux-x64` |
            | Linux ARM64 (Raspberry Pi, Graviton) | `alzc-linux-arm64` |
            | Linux ARM (Termux on Android) | `alzc-linux-arm` |
            | Windows x64 | `alzc-windows-x64.exe` |
            | macOS Apple Silicon M1/M2/M3 | `alzc-macos-arm64` |
            | macOS Intel | `alzc-macos-x64` |

            ### Quick start
            ```bash
            chmod +x alzc-linux-x64
            sudo mv alzc-linux-x64 /usr/local/bin/alzc
            alzc app.az
            ```
          files: |
            alzc-linux-x64
            alzc-linux-arm64
            alzc-linux-arm
            alzc-windows-x64.exe
            alzc-macos-arm64
            alzc-macos-x64
          draft: false
          prerelease: false
